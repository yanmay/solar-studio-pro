<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rounded square container matching the Earthy Obsidian aesthetic -->
  <rect width="100" height="100" rx="22" fill="#0B0908" />
  <rect x="0.5" y="0.5" width="99" height="99" rx="21.5" stroke="#26201C" stroke-width="1" />
  
  <defs>
    <linearGradient id="orange-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5500" />
      <stop offset="100%" stop-color="#FF9900" />
    </linearGradient>
  </defs>

  <!-- Chevron (Roof) - White/Cream -->
  <path d="M 24 60 L 50 34 L 66 50" stroke="#F7F2EB" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Checkmark - Orange Gradient -->
  <path d="M 38 58 L 50 70 L 78 42" stroke="url(#orange-grad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
</svg>